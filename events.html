<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PixelFlow — Events</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e1e;--panel:#252526;--panel2:#2d2d2d;--panel3:#3c3c3c;
  --border:#3c3c3c;--bord2:#555;--sel:#094771;--hover:#2a2d2e;--acc:#007acc;
  --green:#4ec9b0;--amber:#ce9178;--text:#cccccc;--text2:#888;--text3:#555;--red:#f44747;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:12px}
.app{display:grid;grid-template-rows:28px 1fr 20px;height:100%}
body.embedded .app{grid-template-rows:28px 1fr}
body.embedded .statusbar{display:none!important}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:2px;background:var(--panel);border-bottom:1px solid var(--border);padding:0 6px}
.tb{height:22px;padding:0 8px;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);border:1px solid transparent;border-radius:2px;white-space:nowrap;transition:all .08s}
.tb:hover{background:var(--hover);color:var(--text);border-color:var(--border)}
.tb.primary{background:var(--acc);color:#fff;border-color:var(--acc)}.tb.primary:hover{background:#1a8ad4}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:4px}
.scene-sel{font-family:monospace;font-size:11px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:2px;padding:1px 4px;height:18px;cursor:pointer}

/* main */
.main{display:flex;min-height:0;overflow:hidden}

/* sheet */
.sheet-wrap{flex:1;overflow-y:auto;min-height:0}
.sheet-wrap::-webkit-scrollbar{width:8px}
.sheet-wrap::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px}
.sheet-header{display:grid;grid-template-columns:36px 1fr 1fr;position:sticky;top:0;z-index:5;background:#252526;border-bottom:2px solid var(--border)}
.sh-cell{padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.sh-cond{color:#569cd6;border-right:1px solid var(--border)}
.sh-act{color:#4ec9b0}
.ev-row{display:grid;grid-template-columns:36px 1fr 1fr;border-bottom:1px solid var(--border);min-height:48px;transition:background .06s;cursor:default;position:relative}
.ev-row:hover{background:rgba(255,255,255,.02)}
.ev-row.sel{background:rgba(0,122,204,.12)}
.ev-row.disabled{opacity:.4}
.ev-row.rev{background:rgba(206,17,17,.10)}
.ev-num{display:flex;align-items:flex-start;justify-content:center;padding-top:8px;font-size:10px;color:var(--text3);font-family:monospace;border-right:1px solid var(--border);background:rgba(0,0,0,.1)}
.ev-cond{padding:6px 8px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.ev-act{padding:6px 8px;display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 7px 2px 6px;border-radius:2px;font-size:11px;cursor:pointer;max-width:100%;position:relative}
.chip.cond{background:rgba(86,156,214,.15);border:1px solid rgba(86,156,214,.35);color:var(--text)}
.chip.act{background:rgba(78,201,176,.12);border:1px solid rgba(78,201,176,.3);color:var(--text)}
.chip:hover .chip-del{opacity:1}
.chip-icon{font-size:13px;flex-shrink:0}
.chip-name{font-weight:600}
.chip-params{color:var(--amber);font-family:monospace;font-size:10px;margin-left:3px}
.chip-del{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);cursor:pointer;opacity:0;flex-shrink:0;border-radius:2px;transition:all .08s;margin-left:2px}
.chip-del:hover{background:rgba(244,71,71,.2);color:var(--red)}
.add-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;font-size:10px;cursor:pointer;color:var(--text3);border:1px dashed var(--border);border-radius:2px;transition:all .08s;margin-top:1px}
.add-chip.cond:hover{color:#569cd6;border-color:#569cd6}
.add-chip.act:hover{color:#4ec9b0;border-color:#4ec9b0}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;text-align:center;color:var(--text2);height:100%}
.empty-icon{font-size:40px;opacity:.3}
.empty-title{font-size:14px;font-weight:600;color:var(--text)}
.empty-desc{font-size:11px;line-height:1.8;max-width:300px}

/* sidebar */
.sidebar{width:260px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;flex-shrink:0}
.sb-tabs{display:flex;border-bottom:1px solid var(--border)}
.sb-tab{flex:1;padding:6px 0;font-size:10px;font-weight:600;letter-spacing:.5px;text-align:center;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .1s;text-transform:uppercase}
.sb-tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.sb-body{flex:1;overflow-y:auto;min-height:0}
.sb-body::-webkit-scrollbar{width:6px}
.sb-body::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}
.pick-group-head{padding:6px 10px 3px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:rgba(0,0,0,.15)}
.pick-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .06s;border-bottom:1px solid rgba(255,255,255,.03)}
.pick-item:hover{background:var(--hover)}
.pick-item.cond:hover .pi-name{color:#569cd6}
.pick-item.act:hover .pi-name{color:#4ec9b0}
.pi-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.pi-name{font-size:11px;font-weight:600;color:var(--text)}
.pi-desc{font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* cpp */
.cpp-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:var(--panel3);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);flex-shrink:0}
.cpp-copy{padding:2px 8px;background:var(--panel2);border:1px solid var(--border);color:var(--text2);cursor:pointer;border-radius:2px;font-size:10px}
.cpp-copy:hover{color:var(--acc);border-color:var(--acc)}
.cpp-wrap{flex:1;overflow:auto;font-family:monospace;font-size:11px;line-height:1.7;background:#1e1e1e}
.cpp-code{padding:10px 14px;white-space:pre;min-height:100%}
.kw{color:#569cd6}.ty{color:#4ec9b0}.fn{color:#dcdcaa}.cm{color:#6a9955;font-style:italic}.str{color:#ce9178}.num{color:#b5cea8}

/* param modal */
.param-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center}
.param-ov.open{display:flex}
.param-modal{background:var(--panel2);border:1px solid var(--bord2);border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,.6);width:320px;overflow:hidden}
.pm-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel3);border-bottom:1px solid var(--border)}
.pm-title{font-size:12px;font-weight:600;color:var(--text)}
.pm-x{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);cursor:pointer;border-radius:2px}
.pm-x:hover{background:var(--red);color:#fff}
.pm-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.pm-field{display:flex;flex-direction:column;gap:3px}
.pm-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.pm-in,.pm-sel{background:var(--panel3);border:1px solid var(--bord2);color:var(--text);font-family:monospace;font-size:11px;padding:4px 7px;border-radius:2px;outline:none;width:100%}
.pm-in:focus,.pm-sel:focus{border-color:var(--acc)}
.pm-expr{background:#0d2a1a;border-color:#2a5a2a;color:var(--green)}
.pm-expr:focus{border-color:var(--green)}
.pm-foot{display:flex;justify-content:flex-end;gap:6px;padding:8px 12px;border-top:1px solid var(--border);background:var(--panel3)}
.pm-btn{padding:4px 14px;font-size:11px;font-weight:600;border-radius:2px;cursor:pointer;border:1px solid var(--border)}
.pm-ok{background:var(--acc);color:#fff;border-color:var(--acc)}.pm-ok:hover{background:#1a8ad4}
.pm-cancel{background:var(--panel2);color:var(--text2)}.pm-cancel:hover{color:var(--text)}

/* statusbar */
.statusbar{display:flex;align-items:center;background:var(--acc);font-size:11px;font-family:monospace}
.sbc{padding:0 10px;height:100%;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.2);color:#fff;white-space:nowrap}
.sbr{margin-left:auto;display:flex;height:100%}
</style>
</head>
<body>
<div class="app">

<div class="toolbar">
  <div class="tb primary" onclick="addEvent()">+ Add Event</div>
  <div class="tb-sep"></div>
  <div class="tb" id="tb-del" onclick="deleteSelected()" style="opacity:.4;pointer-events:none">✕ Delete</div>
  <div class="tb" id="tb-dup" onclick="duplicateSelected()" style="opacity:.4;pointer-events:none">⧉ Duplicate</div>
  <div class="tb" id="tb-tog" onclick="toggleSelected()" style="opacity:.4;pointer-events:none">◌ Toggle</div>
  <div class="tb-sep"></div>
  <div class="tb" id="tb-up" onclick="moveSelected(-1)" style="opacity:.4;pointer-events:none">↑ Up</div>
  <div class="tb" id="tb-dn" onclick="moveSelected(1)"  style="opacity:.4;pointer-events:none">↓ Down</div>
  <div class="tb-r">
    <select class="scene-sel" id="scene-sel" onchange="setScene(this.value)"></select>
  </div>
</div>

<div class="main">
  <div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
    <div class="sheet-header">
      <div class="sh-cell" style="border-right:1px solid var(--border)">#</div>
      <div class="sh-cell sh-cond">⬡ Conditions — IF</div>
      <div class="sh-cell sh-act">▶ Actions — THEN</div>
    </div>
    <div class="sheet-wrap" id="sheet"></div>
  </div>
  <div class="sidebar">
    <div class="sb-tabs">
      <div class="sb-tab on" id="stab-add" onclick="setSideTab('add')">Add</div>
    </div>
    <div class="sb-body" id="sb-body"></div>
  </div>
</div>

<div class="statusbar">
  <div class="sbc" id="sb-scene">Level_01</div>
  <div class="sbc" id="sb-count">Events: 0</div>
  <div class="sbr">
    <div class="sbc" id="sb-plat">PSP</div>
    <div class="sbc">PixelFlow Events</div>
  </div>
</div>
</div>

<div class="param-ov" id="param-ov" onclick="if(event.target===this)closePM()">
  <div class="param-modal">
    <div class="pm-head">
      <span class="pm-title" id="pm-title">Edit</span>
      <div class="pm-x" onclick="closePM()">✕</div>
    </div>
    <div class="pm-body" id="pm-body"></div>
    <div class="pm-foot">
      <button class="pm-btn pm-cancel" onclick="closePM()">Cancel</button>
      <button class="pm-btn pm-ok" onclick="confirmPM()">OK</button>
    </div>
  </div>
</div>

<script src="events.js"></script>
</body>
</html>
